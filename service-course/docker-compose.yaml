services:
    service-course:
        env_file:
            - .env
        build: .
        ports:
            - 8082:8080
        environment:
            - PORT=${PORT}
        networks:
            - infrastructure_default

    course-database:
        image: postgres:15
        container_name: course-database
        env_file:
            - .env
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "${POSTGRES_HOST_PORT}:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - infrastructure_default

networks:
    infrastructure_default:
        external: true

volumes:
    pgdata:
