services:
    zookeeper:
        restart: always
        container_name: kafka-like-zookeeper
        image: docker.io/bitnamilegacy/zookeeper:3.8
        ports:
            - "${ZOOKEEPER_PORT}:${ZOOKEEPER_PORT}"
        volumes:
            - "zookeeper-volume:/bitnami"
        environment:
            - ALLOW_ANONYMOUS_LOGIN=yes
        networks:
            - infrastructure_default

    kafka-1:
        restart: always
        container_name: kafka-1
        image: docker.io/bitnamilegacy/kafka:3.3
        ports:
            - "${KAFKA_EXTERNAL_PORT_1}:${KAFKA_INTERNAL_PORT}"
        volumes:
            - "kafka-volume-1:/bitnami"
        environment:
            - KAFKA_BROKER_ID=1
            - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:${ZOOKEEPER_PORT}
            - ALLOW_PLAINTEXT_LISTENER=yes
            - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT
            - KAFKA_CFG_LISTENERS=CLIENT://:${KAFKA_INTERNAL_PORT}, EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT_1}
            - KAFKA_CFG_ADVERTISED_LISTENERS=CLIENT://${KAFKA_INTERNAL_HOST_1}:${KAFKA_INTERNAL_PORT},EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT_1}
            - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=CLIENT
        healthcheck:
            test:
                [
                    "CMD",
                    "kafka-topics.sh",
                    "--list",
                    "--bootstrap-server",
                    "localhost:9092",
                ]
            interval: 5s
            retries: 10
            start_period: 10s
        depends_on:
            - zookeeper
        networks:
            - infrastructure_default

    kafka-2:
        restart: always
        container_name: kafka-2
        image: docker.io/bitnamilegacy/kafka:3.3
        ports:
            - "${KAFKA_EXTERNAL_PORT_2}:${KAFKA_INTERNAL_PORT}"
        volumes:
            - "kafka-volume-2:/bitnami"
        environment:
            - KAFKA_BROKER_ID=2
            - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:${ZOOKEEPER_PORT}
            - ALLOW_PLAINTEXT_LISTENER=yes
            - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT
            - KAFKA_CFG_LISTENERS=CLIENT://:${KAFKA_INTERNAL_PORT},EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT_2}
            - KAFKA_CFG_ADVERTISED_LISTENERS=CLIENT://${KAFKA_INTERNAL_HOST_2}:${KAFKA_INTERNAL_PORT},EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT_2}
            - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=CLIENT
        healthcheck:
            test:
                [
                    "CMD",
                    "kafka-topics.sh",
                    "--list",
                    "--bootstrap-server",
                    "localhost:9092",
                ]
            interval: 5s
            retries: 10
            start_period: 10s
        depends_on:
            - zookeeper
        networks:
            - infrastructure_default

    kafka-3:
        restart: always
        container_name: kafka-3
        image: docker.io/bitnamilegacy/kafka:3.3
        ports:
            - "${KAFKA_EXTERNAL_PORT_3}:${KAFKA_INTERNAL_PORT}"
        volumes:
            - "kafka-volume-3:/bitnami"
        environment:
            - KAFKA_BROKER_ID=3
            - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:${ZOOKEEPER_PORT}
            - ALLOW_PLAINTEXT_LISTENER=yes
            - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT
            - KAFKA_CFG_LISTENERS=CLIENT://:${KAFKA_INTERNAL_PORT},EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT_3}
            - KAFKA_CFG_ADVERTISED_LISTENERS=CLIENT://${KAFKA_INTERNAL_HOST_3}:${KAFKA_INTERNAL_PORT},EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT_3}
            - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=CLIENT
        healthcheck:
            test:
                [
                    "CMD",
                    "kafka-topics.sh",
                    "--list",
                    "--bootstrap-server",
                    "localhost:${KAFKA_INTERNAL_PORT}",
                ]
            interval: 5s
            retries: 10
            start_period: 10s
        depends_on:
            - zookeeper
        networks:
            - infrastructure_default

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        ports:
            - "8081:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local-kafka
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
        depends_on:
            - kafka-1
        networks:
            - infrastructure_default

    topic-creator:
        image: docker.io/bitnamilegacy/kafka:3.3
        depends_on:
            kafka-1:
                condition: service_healthy
        entrypoint:
            - sh
            - -c
            - |
                echo "Создаём топик order.status.changed..."
                kafka-topics.sh --create --topic order.status.changed --bootstrap-server kafka-1:9092 --partitions 1 --replication-factor 1
                echo "Топик создан"
        restart: no
        networks:
            - infrastructure_default

volumes:
    kafka-volume-1:
    kafka-volume-2:
    kafka-volume-3:
    zookeeper-volume:

networks:
    infrastructure_default:
        name: infrastructure_default
